        // --- 2. STATE (ตัวแปรควบคุมสถานะ) ---
        let currentPageId = 'home'; // 'home' หรือ id ของ topic เช่น 'greetings'
        let currentPhraseIndex = 0;

        // --- 3. DOM Elements (ตัวแปรอ้างอิง HTML) ---
        const contentArea = document.getElementById('content-area');
        const navArea = document.getElementById('navigation-area');
        const appContainer = document.getElementById('app-container');

        // --- 4. RENDER FUNCTIONS (ฟังก์ชันวาดหน้าจอ) ---

        /**
         * 4.1 วาดหน้า Home (หน้าเลือกหัวข้อ)
         */
        function renderHomePage() {
            currentPageId = 'home';
            currentPhraseIndex = 0;

            contentArea.innerHTML = `
                <h2 class="text-xl font-semibold text-gray-800 mb-4 text-center">เลือกหัวข้อการเรียนรู้</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    ${topics.map(topic => `
                        <button 
                            data-topic-id="${topic.id}" 
                            class="topic-box text-left p-4 bg-white border border-gray-200 rounded-lg shadow-sm hover:shadow-md hover:scale-105 transition-all duration-200 ease-in-out cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-400"
                        >
                            <div class="text-3xl mb-2">${topic.emoji}</div>
                            <h3 class="font-semibold text-gray-900">${topic.title}</h3>
                            <p class="text-sm text-gray-500">${topic.description}</p>
                        </button>
                    `).join('')}
                </div>
            `;
            
            // หน้า Home ไม่ต้องมีปุ่ม Navigation
            navArea.innerHTML = '';
        }

        /**
         * 4.2 วาดหน้าเนื้อหา (หน้า Flashcard)
         */
        function renderTopicPage(topicId) {
            const topic = topics.find(t => t.id === topicId);
            if (!topic) {
                renderHomePage();
                return;
            }

            currentPageId = topicId;
            renderPhrase(); // วาดบัตรคำศัพท์ใบแรก
        }

        /**
         * 4.3 วาดบัตรคำศัพท์ (Flashcard) แต่ละใบ
         */
        function renderPhrase() {
            const topic = topics.find(t => t.id === currentPageId);
            if (!topic) return; // ไม่ควรเกิดขึ้น

            const phrase = topic.phrases[currentPhraseIndex];
            
            // -- วาดเนื้อหา (Flashcard) --
            contentArea.innerHTML = `
                <div class="text-center mb-4">
                    <span class="text-sm font-semibold text-gray-500 bg-gray-100 rounded-full px-3 py-1">
                        ${topic.title} ${topic.emoji}
                    </span>
                </div>
                <div class="flashcard bg-gray-50 border border-gray-200 rounded-xl p-6 text-center" style="min-height: 250px; display: flex; flex-direction: column; justify-content: center;">
                    <p class="text-2xl sm:text-3xl font-bold text-gray-800 mb-4">
                        ${phrase.en}
                    </p>
                    <p class="text-lg sm:text-xl font-medium thai-translation">
                        ${phrase.th}
                    </p>
                </div>
            `;

            // -- วาดปุ่ม Navigation --
            const isFirstCard = currentPhraseIndex === 0;
            const isLastCard = currentPhraseIndex === topic.phrases.length - 1;

            navArea.innerHTML = `
                <div class="flex justify-between items-center">
                    <!-- ปุ่มกลับหน้า Home -->
                    <button 
                        data-action="home"
                        class="nav-button home-button p-2 rounded-full text-gray-500 hover:bg-gray-200 hover:text-gray-800 transition-colors"
                        aria-label="กลับหน้าหลัก"
                    >
                        🏠
                    </button>
                    
                    <!-- กลุ่มปุ่ม Prev/Next -->
                    <div class="flex items-center gap-2">
                        <button 
                            data-action="prev"
                            class="nav-button prev-button px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold shadow-sm hover:bg-blue-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                            ${isFirstCard ? 'disabled' : ''}
                            aria-label="ก่อนหน้า"
                        >
                            ⬅️ ก่อนหน้า
                        </button>
                        
                        <!-- ตัวนับเลขหน้า -->
                        <span class="text-sm text-gray-600 font-medium w-12 text-center">
                            ${currentPhraseIndex + 1} / ${topic.phrases.length}
                        </span>
                        
                        <button 
                            data-action="next"
                            class="nav-button next-button px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold shadow-sm hover:bg-blue-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                            ${isLastCard ? 'disabled' : ''}
                            aria-label="ถัดไป"
                        >
                            ถัดไป ➡️
                        </button>
                    </div>
                </div>
            `;
        }

        // --- 5. EVENT HANDLERS (ฟังก์ชันจัดการการคลิก) ---

        /**
         * 5.1 ไปยังบัตรคำถัดไป
         */
        function showNextPhrase() {
            const topic = topics.find(t => t.id === currentPageId);
            if (topic && currentPhraseIndex < topic.phrases.length - 1) {
                currentPhraseIndex++;
                renderPhrase();
            }
        }

        /**
         * 5.2 ย้อนกลับไปยังบัตรคำก่อนหน้า
         */
        function showPrevPhrase() {
            if (currentPhraseIndex > 0) {
                currentPhraseIndex--;
                renderPhrase();
            }
        }

        /**
         * 5.3 ตัวจัดการการคลิกหลัก (Event Delegation)
         */
        function handleAppClick(event) {
            const target = event.target;
            
            // --- คลิกบนกล่องหัวข้อ (จากหน้า Home) ---
            const topicBox = target.closest('.topic-box');
            if (topicBox) {
                const topicId = topicBox.dataset.topicId;
                if (topicId) {
                    renderTopicPage(topicId);
                    return; // จบการทำงาน
                }
            }

            // --- คลิกบนปุ่ม Navigation ---
            const navButton = target.closest('.nav-button');
            if (navButton) {
                const action = navButton.dataset.action;
                
                switch (action) {
                    case 'home':
                        renderHomePage();
                        break;
                    case 'next':
                        showNextPhrase();
                        break;
                    case 'prev':
                        showPrevPhrase();
                        break;
                }
            }
        }

        // --- 6. INITIALIZATION (การเริ่มต้น) ---
        
        // เมื่อหน้าเว็บโหลดเสร็จ
        document.addEventListener('DOMContentLoaded', () => {
            // เริ่มต้นด้วยการวาดหน้า Home
            renderHomePage();

            // เพิ่ม Event Listener หลักที่ App Container
            // เพื่อจัดการการคลิกทั้งหมดในที่เดียว
            appContainer.addEventListener('click', handleAppClick);
        });

    </script>
</body>
</html>
