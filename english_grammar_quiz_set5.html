<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Structure Quiz - Set 5 (ข้อ 201-250)</title>
    <style>
        :root {
            --primary: #2b4c7e;
            --primary-light: #eef4fc;
            --success: #2e7d32;
            --success-light: #e8f5e9;
            --error: #c62828;
            --error-light: #ffebee;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --bg-body: #f8f9fa;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
            --border-radius: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Tahoma, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            padding: 20px 12px;
            line-height: 1.6;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, var(--primary), #1a3050);
            color: white;
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
        }

        header h1 {
            font-size: 22px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        header p {
            font-size: 14px;
            opacity: 0.85;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
            text-align: center;
        }

        .stat-item .value {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-item .label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Quiz Card */
        .quiz-card {
            background: white;
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .quiz-card.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-number {
            font-size: 13px;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .q-text {
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 12px;
        }

        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            width: 100%;
            padding: 14px 16px;
            background: #fdfdfd;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-dark);
        }

        .option-btn:hover:not(:disabled) {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        /* Answer States */
        .option-btn.correct {
            background-color: var(--success-light) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            font-weight: 600;
        }

        .option-btn.incorrect {
            background-color: var(--error-light) !important;
            border-color: var(--error) !important;
            color: var(--error) !important;
        }

        /* Explanation Box */
        .explanation-box {
            margin-top: 20px;
            padding: 16px;
            background-color: #fcfcfc;
            border-top: 3px solid var(--primary);
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }

        .explanation-box h4 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 15px;
        }

        /* Navigation Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .nav-btn:hover:not(:disabled) {
            background: #1a3050;
        }

        .nav-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        /* Grid Overview */
        .grid-card {
            background: white;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            margin-top: 25px;
        }

        .grid-card h3 {
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text-dark);
            text-align: center;
        }

        .q-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
        }

        .grid-dot {
            aspect-ratio: 1;
            border: 1px solid #cbd5e1;
            background: #f1f5f9;
            border-radius: 6px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .grid-dot.answered-correct {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
        }

        .grid-dot.answered-incorrect {
            background-color: var(--error);
            color: white;
            border-color: var(--error);
        }

        .grid-dot.current {
            box-shadow: 0 0 0 3px var(--primary);
        }

        /* Result View */
        .result-view {
            text-align: center;
            background: white;
            padding: 35px 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            display: none;
        }

        .result-view h2 {
            color: var(--primary);
            margin-bottom: 15px;
        }

        .score-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: var(--primary-light);
            border: 5px solid var(--primary);
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-circle .score-num {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
        }

        .score-circle .score-total {
            font-size: 14px;
            color: var(--text-muted);
        }

        .restart-btn {
            margin-top: 25px;
            background: var(--success);
        }

        .restart-btn:hover {
            background: #235e26;
        }

        @media (max-width: 480px) {
            .q-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            header h1 { font-size: 18px; }
            .q-text { font-size: 15px; }
            .option-btn { font-size: 14px; padding: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📝 English Structure Quiz</h1>
        <p>เซ็ตที่ 5 (ข้อ 201 - 250) | Admissions & College Entrance Test</p>
    </header>

    <div class="stats-bar" id="statsBar">
        <div class="stat-item">
            <div class="value" id="currentNum">1/50</div>
            <div class="label">ข้อปัจจุบัน</div>
        </div>
        <div class="stat-item">
            <div class="value" id="scoreVal">0</div>
            <div class="label">คะแนนที่ได้</div>
        </div>
        <div class="stat-item">
            <div class="value" id="progressPct">0%</div>
            <div class="label">ความคืบหน้า</div>
        </div>
    </div>

    <div id="quizContainer"></div>

    <div class="controls" id="quizControls">
        <button class="nav-btn" id="prevBtn" onclick="changeQuestion(-1)" disabled>◀ ข้อก่อนหน้า</button>
        <button class="nav-btn" id="nextBtn" onclick="changeQuestion(1)">ข้อถัดไป ▶</button>
    </div>

    <div class="result-view" id="resultView">
        <h2>🎉 สรุปผลคะแนนของคุณ</h2>
        <p>คุณได้ทำแนวข้อสอบครบถ้วนทั้ง 50 ข้อเรียบร้อยแล้ว</p>
        <div class="score-circle">
            <div class="score-num" id="finalScore">0</div>
            <div class="score-total">เต็ม 50</div>
        </div>
        <p id="resultFeedback" style="font-weight: 500; margin-bottom: 15px;"></p>
        <button class="nav-btn restart-btn" onclick="restartQuiz()">🔄 ทำใหม่อีกครั้ง</button>
    </div>

    <div class="grid-card" id="gridCard">
        <h3>🎯 แผงควบคุมข้อสอบ</h3>
        <div class="q-grid" id="questionGrid"></div>
    </div>
</div>

<script>
    const quizData = [
        { id: 201, question: '"Your car is very dirty."<br>"I know, it really needs ____."', options: ['(A) to wash', '(B) washed', '(C) washing', '(D) wash'], answer: 2, explanation: 'โครงสร้าง need + V.ing ใช้เมื่อประธานเป็นสิ่งไม่มีชีวิตและต้องการสื่อความหมายเชิงถูกกระทำ (รถจำเป็นต้องได้รับการล้าง) มีความหมายเท่ากับ need to be washed' },
        { id: 202, question: '"Why is he so tired in the morning?"<br>"He is not used ____ up so early."', options: ['(A) to wake', '(B) to waking', '(C) wake', '(D) waking'], answer: 1, explanation: 'โครงสร้าง be used to (คุ้นเคยกับ / ชินกับ) คำว่า to ในที่นี้เป็น Preposition จึงต้องตามด้วย Gerund (V.ing) เสมอ' },
        { id: 203, question: '"When did the rain start?"<br>"No sooner had we left the house ____ it started to rain."', options: ['(A) when', '(B) that', '(C) than', '(D) then'], answer: 2, explanation: 'โครงสร้าง Inversion ขั้นสูง: No sooner had + S + V.3 + "than" + S + V.2 แปลว่า ทันทีที่...ก็เกิด... (ต้องใช้คู่กับ than เสมอ)' },
        { id: 204, question: '"Would you like to go to the cinema?"<br>"I prefer watching TV at home ____ to the cinema."', options: ['(A) than going', '(B) to go', '(C) to going', '(D) rather than go'], answer: 2, explanation: 'โครงสร้าง prefer doing something "to" doing something else (ชอบทำสิ่งหนึ่งมากกว่าอีกสิ่งหนึ่ง) ต้องใช้บุพบท to เชื่อมระหว่าง Gerund ทั้งสองตัว' },
        { id: 205, question: '"Why did you rewrite the essay?"<br>"The teacher made me ____ it again."', options: ['(A) do', '(B) doing', '(C) to do', '(D) done'], answer: 0, explanation: 'Causative Verb: โครงสร้าง make someone "do" something (บังคับ/สั่งให้ใครทำ) จะต้องตามด้วย Bare Infinitive (V.1 ที่ไม่มี to) เสมอ' },
        { id: 206, question: '"Is the tea ready to drink?"<br>"No, it is ____ hot to drink right now."', options: ['(A) very', '(B) so', '(C) too', '(D) such'], answer: 2, explanation: 'โครงสร้าง too + Adjective + to + V.inf แปลว่า "มากเกินไปที่จะ..." (ในที่นี้คือ ร้อนเกินไปที่จะดื่ม)' },
        { id: 207, question: '"Are you going to the party tonight?"<br>"I am so tired. I would rather ____ at home."', options: ['(A) stay', '(B) to stay', '(C) staying', '(D) stayed'], answer: 0, explanation: 'โครงสร้าง would rather (อยากจะ...มากกว่า) เมื่อประธานทำเองในปัจจุบัน/อนาคต ต้องตามด้วย Bare Infinitive (V.1 ที่ไม่มี to) ทันที' },
        { id: 208, question: '"Can I smoke in here?"<br>"I would rather you ____ outside."', options: ['(A) smoke', '(B) to smoke', '(C) smoking', '(D) smoked'], answer: 3, explanation: 'โครงสร้าง would rather + Subject + V.2 ใช้เพื่อแสดงความปรารถนาให้ผู้อื่นทำบางสิ่งในปัจจุบัน/อนาคต (อยากให้คุณสูบบุหรี่ข้างนอกมากกว่า)' },
        { id: 209, question: '"Why did you fail the test?"<br>"If only I ____ harder last month!"', options: ['(A) study', '(B) studied', '(C) have studied', '(D) had studied'], answer: 3, explanation: 'โครงสร้าง If only (สมมติ/รำพึงรำพัน) เมื่อพูดถึงความเสียดายในอดีต (last month) จะต้องใช้คู่กับ Past Perfect (had + V.3) เสมอ' },
        { id: 210, question: '"How is the new employee?"<br>"Not only ____ hard, but he is also very smart."', options: ['(A) he works', '(B) does he work', '(C) he does work', '(D) works he'], answer: 1, explanation: 'Inversion: เมื่อนำกลุ่มคำปฏิเสธ (Not only) ขึ้นต้นประโยค จะต้องสลับประธานและกริยาช่วย (เหมือนประโยคคำถาม) จึงต้องใช้ does he work' },
        { id: 211, question: '"It is getting late."<br>"Yes, it is high time we ____ back home."', options: ['(A) go', '(B) to go', '(C) went', '(D) going'], answer: 2, explanation: 'โครงสร้าง It is high time + Subject + V.2 เป็นการสมมติหรือเร่งรัดว่า "ถึงเวลาอันสมควรแล้วที่ต้องทำ..." (กริยาต้องเป็นรูปอดีต)' },
        { id: 212, question: '"How many students are there?"<br>"The number of students in this class ____ thirty."', options: ['(A) is', '(B) are', '(C) have been', '(D) were'], answer: 0, explanation: 'Subject-Verb Agreement: โครงสร้าง The number of + Noun พหูพจน์ ถือเป็นประธาน "เอกพจน์" (แปลว่า ยอดจำนวน) จึงต้องใช้กริยา is' },
        { id: 213, question: '"Are there any applicants today?"<br>"A number of applicants ____ waiting outside."', options: ['(A) is', '(B) are', '(C) has been', '(D) was'], answer: 1, explanation: 'Subject-Verb Agreement: โครงสร้าง A number of + Noun พหูพจน์ ถือเป็นประธาน "พหูพจน์" (แปลว่า จำนวนมาก) จึงต้องใช้กริยา are' },
        { id: 214, question: '"Which of the two boys is your brother?"<br>"Neither of the boys ____ my brother."', options: ['(A) are', '(B) is', '(C) to be', '(D) have been'], answer: 1, explanation: 'Subject-Verb Agreement: โครงสร้าง Neither of + Noun พหูพจน์ ตามหลักไวยากรณ์มาตรฐานจะถือเป็นประธาน "เอกพจน์" จึงใช้ is (แปลว่า ไม่ใช่ทั้งคู่)' },
        { id: 215, question: '"Can I borrow your laptop?"<br>"Sorry, it ____ at the moment."', options: ['(A) repairs', '(B) is repairing', '(C) is being repaired', '(D) has repaired'], answer: 2, explanation: 'Passive Voice ในรูป Present Continuous: ประธาน (it) ถูกกระทำ และเหตุการณ์กำลังเกิดขึ้น (at the moment) จึงใช้ is being + V.3' },
        { id: 216, question: '"It\'s a beautiful day."<br>"Let\'s go for a walk, ____?"', options: ['(A) don\'t we', '(B) will we', '(C) shall we', '(D) won\'t we'], answer: 2, explanation: 'Question Tag: ประโยคชักชวนที่ขึ้นต้นด้วย Let\'s (Let us) จะถูกบังคับให้ใช้ Tag ท้ายประโยคว่า shall we? เสมอ' },
        { id: 217, question: '"I am the winner."<br>"I am right, ____?"', options: ['(A) am not I', '(B) aren\'t I', '(C) don\'t I', '(D) am I'], answer: 1, explanation: 'Question Tag: กฎข้อยกเว้นพิเศษสำหรับ I am เมื่อทำเป็น Question Tag รูปปฏิเสธ จะไม่ใช้ am not I (ไม่มีรูปย่อ) แต่จะเปลี่ยนไปใช้ aren\'t I? แทน' },
        { id: 218, question: '"Does he go to the gym often?"<br>"He hardly ever goes to the gym, ____?"', options: ['(A) does he', '(B) doesn\'t he', '(C) is he', '(D) isn\'t he'], answer: 0, explanation: 'Question Tag: คำว่า hardly (แทบจะไม่) มีความหมายแฝงเป็นปฏิเสธอยู่แล้ว ประโยค Tag ด้านหลังจึงต้องใช้รูป "บอกเล่า" (does he?)' },
        { id: 219, question: '"Will the movie be over soon?"<br>"By the time we arrive, the movie ____."', options: ['(A) will start', '(B) starts', '(C) will have started', '(D) had started'], answer: 2, explanation: 'Future Perfect Tense: มีโครงสร้างบอกเวลาในอนาคต (By the time + Present Simple) เหตุการณ์ที่จะเสร็จสมบูรณ์ในอนาคตจะใช้ will have + V.3' },
        { id: 220, question: '"Did you see the manager?"<br>"No, by the time I arrived, he ____."', options: ['(A) has left', '(B) left', '(C) was leaving', '(D) had left'], answer: 3, explanation: 'Past Perfect Tense: เหตุการณ์ 2 อย่างในอดีต เหตุการณ์ที่เกิดก่อนและจบไปแล้ว (ผู้จัดการออกไปแล้ว) ใช้ Past Perfect (had + V.3) ส่วนเหตุการณ์ที่เกิดทีหลัง (ฉันไปถึง) ใช้ Past Simple' },
        { id: 221, question: '"Did they win the match?"<br>"Yes, they won ____ their lack of training."', options: ['(A) although', '(B) even though', '(C) because', '(D) despite'], answer: 3, explanation: 'คำว่า their lack of training เป็นกลุ่มคำนาม (Noun Phrase) ดังนั้นต้องใช้ Preposition แสดงความขัดแย้ง คือ despite (ส่วน although ต้องตามด้วยประโยค)' },
        { id: 222, question: '"Why was the flight canceled?"<br>"The flight was canceled ____ the heavy fog."', options: ['(A) because', '(B) since', '(C) because of', '(D) as'], answer: 2, explanation: 'คำว่า the heavy fog เป็นกลุ่มคำนาม (Noun Phrase) ดังนั้นเพื่อบอกเหตุผลจึงต้องใช้ Preposition คือ because of (เนื่องจาก)' },
        { id: 223, question: '"How was the movie?"<br>"It was ____ good movie that I watched it twice."', options: ['(A) so', '(B) such', '(C) such a', '(D) so a'], answer: 2, explanation: 'โครงสร้างการเน้นย้ำ: such + a/an + Adjective + Noun เอกพจน์นับได้ (a good movie) + that แปลว่า เป็นหนังที่ดีมากจนกระทั่ง...' },
        { id: 224, question: '"Why did you buy that shirt?"<br>"It was ____ cheap that I couldn\'t resist."', options: ['(A) so', '(B) such', '(C) too', '(D) very'], answer: 0, explanation: 'โครงสร้างการเน้นย้ำ: so + Adjective/Adverb (cheap) + that แปลว่า ถูกมากจนกระทั่ง...' },
        { id: 225, question: '"Who is that crying?"<br>"That is the girl ____ bicycle was stolen."', options: ['(A) who', '(B) whom', '(C) whose', '(D) which'], answer: 2, explanation: 'Relative Pronoun: ต้องการเชื่อมประโยคเพื่อแสดงความเป็นเจ้าของ (จักรยานของเด็กผู้หญิงคนนั้น) จึงต้องใช้ whose' },
        { id: 226, question: '"Who was on the phone?"<br>"The person ____ I spoke was very helpful."', options: ['(A) who', '(B) to who', '(C) whom', '(D) to whom'], answer: 3, explanation: 'Relative Pronoun: กริยา speak ต้องใช้คู่กับบุพบท to (speak to someone) เมื่อเป็นกรรมของประโยคย่อยและนำบุพบทมาไว้ด้านหน้า ต้องใช้ to whom' },
        { id: 227, question: '"How did you find the wallet?"<br>"____ down the street, I saw it on the ground."', options: ['(A) Walking', '(B) Walked', '(C) Walk', '(D) To walk'], answer: 0, explanation: 'Participle Clause: ประธานของประโยคหลัก (I) เป็นผู้กระทำกริยาเดินเอง (Active Voice) การลดรูปประโยคส่วนหน้าจึงต้องใช้ Present Participle (V.ing)' },
        { id: 228, question: '"How old is this building?"<br>"____ in 1990, it is the oldest in town."', options: ['(A) Building', '(B) Built', '(C) Build', '(D) Having build'], answer: 1, explanation: 'Participle Clause: ประธานของประโยคหลัก (it = the building) เป็นผู้ถูกกระทำ (ถูกสร้าง) การลดรูปประโยคส่วนหน้าจึงต้องใช้ Past Participle (V.3 = Built)' },
        { id: 229, question: '"Your computer is very fast now."<br>"Yes, I got the technician ____ the memory."', options: ['(A) upgrade', '(B) upgrading', '(C) to upgrade', '(D) upgraded'], answer: 2, explanation: 'Causative Verb: โครงสร้าง get + someone + "to do" something แปลว่า โน้มน้าวหรือจ้างให้ใครทำอะไร (บังคับต้องมี to)' },
        { id: 230, question: '"Who painted your house?"<br>"I had a professional painter ____ it."', options: ['(A) paint', '(B) to paint', '(C) painting', '(D) painted'], answer: 0, explanation: 'Causative Verb: โครงสร้าง have + someone + "do" something แปลว่า มอบหมายให้ใครทำอะไร (บังคับใช้ Bare Infinitive หรือกริยาช่อง 1 แบบไม่เติม to)' },
        { id: 231, question: '"Your hair looks beautiful."<br>"Thank you. I just had it ____ yesterday."', options: ['(A) cut', '(B) to cut', '(C) cutting', '(D) cuts'], answer: 0, explanation: 'Causative Verb: โครงสร้าง have + something + "done" (V.3) แปลว่า ให้คนอื่นทำสิ่งนั้นให้ (ผมถูกตัด)' },
        { id: 232, question: '"What did the manager say?"<br>"He suggested that the deadline ____ extended."', options: ['(A) is', '(B) was', '(C) be', '(D) to be'], answer: 2, explanation: 'Subjunctive Mood: หลังกริยา suggest + that โครงสร้างต้องเป็น Subject + V.infinitive เสมอ (ในกรณีถูกกระทำ จึงใช้ be + V.3)' },
        { id: 233, question: '"It is raining heavily."<br>"I recommend ____ a taxi."', options: ['(A) to take', '(B) take', '(C) taking', '(D) taken'], answer: 2, explanation: 'คำกริยา recommend (แนะนำ) หากตามด้วยคำกริยาทันทีโดยไม่มีกรรมมารองรับ จะต้องใช้รูป Gerund (V.ing) เสมอ' },
        { id: 234, question: '"Is he still smoking?"<br>"No, he stopped ____ last year."', options: ['(A) smoke', '(B) to smoke', '(C) smoking', '(D) smoked'], answer: 2, explanation: 'คำกริยา stop หากตามด้วย V.ing จะแปลว่า "เลิกทำกิจกรรมนั้นไปเลย" (เลิกสูบบุหรี่) แต่ถ้าตามด้วย to V.inf จะแปลว่าหยุดเพื่อที่จะทำสิ่งอื่น' },
        { id: 235, question: '"Did you lock the door?"<br>"Oh no! I forgot ____ it."', options: ['(A) lock', '(B) to lock', '(C) locking', '(D) locked'], answer: 1, explanation: 'คำกริยา forget หากตามด้วย to + V.inf จะแปลว่า "ลืมที่จะทำ" (ยังไม่ได้ทำ) ส่วนถ้าตามด้วย V.ing จะแปลว่า ทำไปแล้วแต่ลืม' },
        { id: 236, question: '"How much money do you have?"<br>"I have ____ any money left."', options: ['(A) hardly', '(B) hard', '(C) mostly', '(D) almost'], answer: 0, explanation: 'สำนวน hardly any มีความหมายแปลว่า "แทบจะไม่มีเลย" เป็นคำปฏิเสธในตัว ใช้กับบริบทที่เงินใกล้จะหมด' },
        { id: 237, question: '"How should we proceed?"<br>"____ we start, the sooner we will finish."', options: ['(A) Earlier', '(B) The earlier', '(C) The earliest', '(D) Early'], answer: 1, explanation: 'โครงสร้าง Double Comparative: The + ขั้นกว่า (The earlier), the + ขั้นกว่า (the sooner) แปลว่า ยิ่งเริ่มเร็ว ก็ยิ่งเสร็จเร็ว' },
        { id: 238, question: '"How much did the car cost?"<br>"It cost ____ as the old one."', options: ['(A) twice as much', '(B) as much twice', '(C) twice more', '(D) two times more'], answer: 0, explanation: 'การเปรียบเทียบจำนวนเท่า (Multiple Number) จะวางคำบอกจำนวนเท่า (twice, three times) ไว้ "หน้า" โครงสร้าง as...as เสมอ' },
        { id: 239, question: '"What does your brother do?"<br>"He works ____ a teacher at a local school."', options: ['(A) like', '(B) as', '(C) similar to', '(D) same as'], answer: 1, explanation: 'การบอกบทบาท หน้าที่ หรืออาชีพ จะใช้คำว่า as (ในฐานะที่เป็น) ส่วน like จะใช้เปรียบเทียบความเหมือนเท่านั้น' },
        { id: 240, question: '"Why is he shouting?"<br>"He acts as if he ____ the boss."', options: ['(A) is', '(B) was', '(C) were', '(D) has been'], answer: 2, explanation: 'การสมมติเหตุการณ์ที่ไม่จริงในปัจจุบันหลัง as if / as though (ราวกับว่า) กฎไวยากรณ์ดั้งเดิมกำหนดให้ใช้ were กับประธานทุกตัว' },
        { id: 241, question: '"Where is the dog?"<br>"It ____ on the sofa all afternoon yesterday."', options: ['(A) lay', '(B) laid', '(C) lie', '(D) lain'], answer: 0, explanation: 'คำกริยา "นอนลง / เอนกาย" คือ lie ซึ่งรูปอดีต (V.2) ของ lie คือ lay (ส่วน laid เป็นอดีตของ lay ที่แปลว่า วางไข่/จัดวาง)' },
        { id: 242, question: '"What happens in the east?"<br>"The sun ____ in the east."', options: ['(A) raises', '(B) rises', '(C) arises', '(D) rouses'], answer: 1, explanation: 'คำกริยา "ลอยขึ้น / สูงขึ้น" ด้วยตัวเอง (ไม่ต้องมีกรรมมารองรับ) คือ rise ส่วน raise แปลว่า ยกขึ้น (ต้องมีกรรม)' },
        { id: 243, question: '"Do you know his address?"<br>"No, I don\'t know where ____."', options: ['(A) does he live', '(B) he lives', '(C) is he living', '(D) he live'], answer: 1, explanation: 'Noun Clause ที่อยู่ในตำแหน่งกรรมของประโยค (Indirect Question) ต้องเรียงโครงสร้างแบบประโยคบอกเล่า คือ Subject + Verb' },
        { id: 244, question: '"What are her hobbies?"<br>"She enjoys swimming, reading, and ____."', options: ['(A) paint', '(B) to paint', '(C) painting', '(D) paints'], answer: 2, explanation: 'โครงสร้างคู่ขนาน (Parallel Structure) เมื่อเชื่อมด้วย and รูปแบบคำจะต้องไปในทิศทางเดียวกันทั้งหมด (V.ing, V.ing, and V.ing)' },
        { id: 245, question: '"Who is that child?"<br>"He is a ____ boy."', options: ['(A) five-years-old', '(B) five-year-old', '(C) five year olds', '(D) five years old'], answer: 1, explanation: 'Compound Adjective: เมื่อนำตัวเลขและคำนามมารวมกันโดยมีขีด (Hyphen) เพื่อทำหน้าที่เป็น Adjective ขยายคำนาม คำนามด้านในห้ามเติม s เสมอ' },
        { id: 246, question: '"Did you get the details?"<br>"Yes, they gave me a lot of ____."', options: ['(A) informations', '(B) information', '(C) an information', '(D) the informations'], answer: 1, explanation: 'คำว่า information (ข้อมูล) เป็นคำนามนับไม่ได้ (Uncountable Noun) จึงไม่สามารถเติม s หรือใช้ a/an นำหน้าได้' },
        { id: 247, question: '"When were you born?"<br>"I was born ____ 2005."', options: ['(A) on', '(B) at', '(C) in', '(D) to'], answer: 2, explanation: 'Preposition of Time: สำหรับเดือน (Month), ปี (Year), ฤดูกาล (Season) จะต้องใช้บุพบท in เสมอ' },
        { id: 248, question: '"Where did you leave your bag?"<br>"I left it ____ the bus stop."', options: ['(A) on', '(B) in', '(C) at', '(D) by'], answer: 2, explanation: 'Preposition of Place: สถานที่ที่เป็นจุดเฉพาะเจาะจง (Specific Point) เช่น ป้ายรถเมล์, สถานีรถไฟ จะใช้บุพบท at' },
        { id: 249, question: '"What did she say at the end of the email?"<br>"She wrote, \'I look forward to ____ from you soon.\'"', options: ['(A) hear', '(B) hearing', '(C) heard', '(D) have heard'], answer: 1, explanation: 'สำนวน look forward to แปลว่า ตั้งตารอคอย คำว่า to ในที่นี้เป็นบุพบท จึงต้องตามด้วย Gerund (V.ing)' },
        { id: 250, question: '"Should we try to fix the old TV?"<br>"No, it\'s no use ____ to fix it. It\'s completely broken."', options: ['(A) try', '(B) to try', '(C) trying', '(D) tried'], answer: 2, explanation: 'สำนวน It is no use / It is no good แปลว่า "เปล่าประโยชน์ที่จะ..." โครงสร้างบังคับคือต้องตามด้วย Gerund (V.ing) เสมอ' }
    ];

    let currentIndex = 0;
    let score = 0;
    const userAnswers = new Array(quizData.length).fill(null);

    function initQuiz() {
        const container = document.getElementById('quizContainer');
        const grid = document.getElementById('questionGrid');
        container.innerHTML = '';
        grid.innerHTML = '';

        quizData.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = `quiz-card ${idx === 0 ? 'active' : ''}`;
            card.id = `card-${idx}`;

            let optionsHtml = '';
            q.options.forEach((opt, optIdx) => {
                optionsHtml += `<button class="option-btn" id="opt-${idx}-${optIdx}" onclick="selectAnswer(${idx}, ${optIdx})">${opt}</button>`;
            });

            card.innerHTML = `
                <div class="q-number">Question ${q.id}</div>
                <div class="q-text">${q.question}</div>
                <div class="options-list">${optionsHtml}</div>
                <div class="explanation-box" id="explain-${idx}">
                    <h4>💡 คำอธิบาย:</h4>
                    <p>${q.explanation}</p>
                </div>
            `;
            container.appendChild(card);

            const dot = document.createElement('div');
            dot.className = `grid-dot ${idx === 0 ? 'current' : ''}`;
            dot.id = `dot-${idx}`;
            dot.innerText = q.id;
            dot.onclick = () => jumpToQuestion(idx);
            grid.appendChild(dot);
        });

        updateStatsBar();
    }

    function selectAnswer(qIdx, optIdx) {
        if (userAnswers[qIdx] !== null) return; 

        const q = quizData[qIdx];
        const isCorrect = (optIdx === q.answer);
        userAnswers[qIdx] = { chosenIndex: optIdx, isCorrect: isCorrect };

        if (isCorrect) score++;

        const chosenBtn = document.getElementById(`opt-${qIdx}-${optIdx}`);
        if (isCorrect) {
            chosenBtn.classList.add('correct');
        } else {
            chosenBtn.classList.add('incorrect');
            document.getElementById(`opt-${qIdx}-${q.answer}`).classList.add('correct');
        }

        q.options.forEach((_, i) => {
            document.getElementById(`opt-${qIdx}-${i}`).disabled = true;
        });

        document.getElementById(`explain-${qIdx}`).style.display = 'block';

        const dot = document.getElementById(`dot-${qIdx}`);
        dot.className = `grid-dot ${isCorrect ? 'answered-correct' : 'answered-incorrect'}`;
        if (qIdx === currentIndex) dot.classList.add('current');

        updateStatsBar();
        
        if (userAnswers.filter(a => a !== null).length === quizData.length) {
            document.getElementById('nextBtn').innerText = 'ดูผลสรุปคะแนน ▶';
        }
    }

    function changeQuestion(direction) {
        if (currentIndex === quizData.length - 1 && direction === 1) {
            showResults();
            return;
        }

        document.getElementById(`card-${currentIndex}`).classList.remove('active');
        document.getElementById(`dot-${currentIndex}`).classList.remove('current');

        currentIndex += direction;

        document.getElementById(`card-${currentIndex}`).classList.add('active');
        document.getElementById(`dot-${currentIndex}`).classList.add('current');

        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        
        if (currentIndex === quizData.length - 1) {
            document.getElementById('nextBtn').innerText = userAnswers.filter(a => a !== null).length === quizData.length ? 'ดูผลสรุปคะแนน ▶' : 'สรุปผลคะแนน';
        } else {
            document.getElementById('nextBtn').innerText = 'ข้อถัดไป ▶';
        }

        updateStatsBar();
    }

    function jumpToQuestion(idx) {
        document.getElementById(`card-${currentIndex}`).classList.remove('active');
        document.getElementById(`dot-${currentIndex}`).classList.remove('current');

        document.getElementById('quizContainer').style.display = 'block';
        document.getElementById('quizControls').style.display = 'flex';
        document.getElementById('resultView').style.display = 'none';

        currentIndex = idx;

        document.getElementById(`card-${currentIndex}`).classList.add('active');
        document.getElementById(`dot-${currentIndex}`).classList.add('current');

        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        
        if (currentIndex === quizData.length - 1) {
            document.getElementById('nextBtn').innerText = userAnswers.filter(a => a !== null).length === quizData.length ? 'ดูผลสรุปคะแนน ▶' : 'สรุปผลคะแนน';
        } else {
            document.getElementById('nextBtn').innerText = 'ข้อถัดไป ▶';
        }

        updateStatsBar();
    }

    function updateStatsBar() {
        document.getElementById('currentNum').innerText = `${currentIndex + 1}/${quizData.length}`;
        document.getElementById('scoreVal').innerText = score;
        
        const answeredCount = userAnswers.filter(a => a !== null).length;
        const pct = Math.round((answeredCount / quizData.length) * 100);
        document.getElementById('progressPct').innerText = `${pct}%`;
    }

    function showResults() {
        document.getElementById('quizContainer').style.display = 'none';
        document.getElementById('quizControls').style.display = 'none';
        
        const resultView = document.getElementById('resultView');
        resultView.style.display = 'block';
        
        document.getElementById('finalScore').innerText = score;

        let feedback = '';
        if (score >= 45) feedback = 'Excellent! 🌟 แกรมมาร์แน่นมาก พร้อมทำข้อสอบเข้ามหาวิทยาลัยได้สบายๆ ครับ!';
        else if (score >= 35) feedback = 'Good Job! 👍 เก่งมากครับ ทบทวนอีกนิดเพื่อความแม่นยำเต็มร้อยนะ!';
        else if (score >= 25) feedback = 'Fair! 🎯 ผ่านเกณฑ์พอดีครับ ศึกษาคำอธิบายเพิ่มเติมเพื่อความชัวร์นะ!';
        else feedback = 'Keep fighting! 📖 ค่อยๆ ฝึกฝนและเรียนรู้จากข้อผิดพลาดครับ!';
        
        document.getElementById('resultFeedback').innerText = feedback;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function restartQuiz() {
        score = 0;
        currentIndex = 0;
        userAnswers.fill(null);

        document.getElementById('quizContainer').style.display = 'block';
        document.getElementById('quizControls').style.display = 'flex';
        document.getElementById('resultView').style.display = 'none';
        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').innerText = 'ข้อถัดไป ▶';

        initQuiz();
    }

    window.onload = initQuiz;
</script>

</body>
